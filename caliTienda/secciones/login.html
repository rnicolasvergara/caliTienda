<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/styles.css" />
  <title>CaliTienda - Autenticación</title>
</head>

<body>
  <div class="grid-container">
    <header class="header">
      <a href="../index.html">
        <img class="logo" src="../img/logoCali3.png" alt="Logo CaliTienda">
      </a>
      <ul>
        <li>
          <a href="../index.html">Volver al inicio</a>
        </li>
      </ul>
    </header>

    <main class="main login-container">
      <div id="divlogin">
        <h1 id="Titulo-Iniciar">Iniciar Sesión</h1>
        <form id="formlogin">
          <input type="text" name="user" id="user" placeholder="Usuario" required>
          <input type="password" name="password" id="password" placeholder="Contraseña" required>
          <div class="btns">
            <button class="btn-login" id="login" type="button">Login</button>
            <button class="btn-register" id="register" type="button">Registrarse</button>
          </div>
          <button id="recuperarContrasenia" type="button">Olvidé mi contraseña</button>
        </form>
        <div id="divRegister">
          <form id="formRegister">
            <h2>Crear Nueva Cuenta</h2>
            <input type="email" name="email" id="inputEmail" placeholder="Correo electrónico" required>
            <input type="text" name="user" id="inputUser" placeholder="Usuario" required>
            <input type="password" name="inputPassword" id="inputPassword" placeholder="Contraseña" required>
            <input type="submit" id="imputRegister" value="Crear Cuenta">
          </form>
        </div>
        <div id="newPassw">
          <h2>Recuperar Contraseña</h2>
          <input type="email" id="emailRecuperar" placeholder="Ingrese su correo" required/>
          <input type="password" id="passRecuperar" placeholder="Nueva contraseña" required/>
          <input type="password" id="passConfirm" placeholder="Confirmar contraseña" required/>
          <button id="cambiarPass" type="button">Cambiar Contraseña</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>© 2024 CaliTienda, todos los derechos reservados</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Base de datos local -->
  <script src="../funcionalidad/database.js"></script>
  <script src="../funcionalidad/data.js"></script>
  <!-- Autenticación -->
  <script src="../funcionalidad/auth.js"></script>
</body>

</html>
